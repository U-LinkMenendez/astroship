<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opciones disponibles</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #fafafa;
  margin: 0;
  padding: 20px;
  padding-bottom: 90px;
}

/* CARDS */
.card {
  background:white;
  border-radius:14px;
  padding:12px;
  margin-bottom:12px;
  display:flex;
  gap:12px;
}
.card.selected { border:2px solid #c8a96a; }
.card img { width:70px; height:70px; border-radius:10px; }
.info { flex:1; }

button {
  background:#111;
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:20px;
}
button.alt { background:#c8a96a; color:black; }

.total { display:none; }

/* PROMOCIONES */
  .promo-section {
    position: relative;
    margin-bottom: 20px;
  } 
  
  .promo-slider {
    display: flex;
    overflow: hidden;
    border-radius: 14px;
    transition: transform 0.3s ease;
  }
  
  .promo-card {
    min-width: 100%;
    position: relative;
  }
  
  .promo-card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 14px;
  }
  
  .promo-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .promo-nav {
    position: absolute;
    top: 40%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.6);
    text-align: center;
    line-height: 28px;
    cursor: pointer;
  }
  
  .promo-nav.left { left: 5px; }
  .promo-nav.right { right: 5px; }
  
  .promo-dots {
    text-align: center;
    margin-top: 6px;
  }
  
  .promo-dot {
    width: 6px;
    height: 6px;
    background: #ccc;
    display: inline-block;
    border-radius: 50%;
    margin: 0 3px;
  }
  
  .promo-dot.active {
    background: #555;
  }
  
</style>
</head>

<body>

<input id="buscador" placeholder="Buscar..." oninput="filtrarServicios()">

<!-- PROMOCIONES -->
<div class="promo-section">
  <div class="promo-slider" id="promoSlider"></div>
  <div class="promo-dots" id="promoDots"></div>
  <div class="promo-nav left" onclick="moverPromo(-1)">‹</div>
  <div class="promo-nav right" onclick="moverPromo(1)">›</div>
</div>

<div id="menu"></div>

<div class="carrito">
  <button class="alt" onclick="enviar()">Enviar solicitud</button>
</div>

<script>

// ===== PROMOS =====
const promociones = [
  { nombre:"Botox + Hidratación", imagen:"/img/Portada.jpg", vigencia:"2026-05-01"},
  { nombre:"CO2 Especial", imagen:"/img/Portada.jpg", vigencia:"2024-01-01"}
];

let promoIndex = 0;

function renderPromos(){

  const slider = document.getElementById("promoSlider");
  const dots = document.getElementById("promoDots");

  if(!slider || !dots) return; // 🛡️ PROTECCIÓN

  let html = "";

  promociones.forEach(p=>{
    let vencida = new Date(p.vigencia) < new Date();

    html += `
  <div class="promo-card">
    <img src="${p.imagen}">
    
    ${vencida ? '<div class="promo-overlay">VENCIDA</div>' : ''}

    <button 
      onclick="interesPromo('${p.nombre}')"
      style="
        position:absolute;
        bottom:10px;
        left:10px;
        padding:6px 10px;
        font-size:12px;
        border-radius:20px;
        background:#c8a96a;
        color:black;
      ">
      Me interesa
    </button>

  </div>`;
  });

  slider.innerHTML = html;

  renderDots();
}

function renderDots(){
  let dots="";
  promociones.forEach((_,i)=>{
    dots += `<span class="promo-dot ${i===promoIndex?'active':''}"></span>`;
  });
  document.getElementById("promoDots").innerHTML = dots;
}

function moverPromo(dir){
  promoIndex += dir;
  if(promoIndex<0) promoIndex = promociones.length-1;
  if(promoIndex>=promociones.length) promoIndex=0;
  document.getElementById("promoSlider").style.transform =
    "translateX(-"+(promoIndex*100)+"%)";
  renderDots();
}

function interesPromo(nombre){

  const mensaje = `Hola, me interesa la promoción: ${nombre}`;

  const url = "https://wa.me/5219996690192?text=" + 
              encodeURIComponent(mensaje);

  window.open(url, "_blank");
}

// ===== SERVICIOS =====
const servicios = [
  {nombre:"Botox", desc:"Reduce arrugas", img:"/img/botox.webp"},
  {nombre:"Rinomodelación", desc:"Sin cirugía", img:"/img/nose.webp"}
];

let carrito=[];

function render(){
  let html="";
  servicios.forEach((s,i)=>{
    let sel = carrito.includes(i);
    html += `
    <div class="card ${sel?'selected':''}">
      <img src="${s.img}">
      <div class="info">
        <div>${s.nombre}</div>
        <div style="font-size:11px;color:#777">${s.desc}</div>
      </div>
      <button onclick="toggle(${i})">${sel?'Quitar':'Agregar'}</button>
    </div>`;
  });
  document.getElementById("menu").innerHTML = html;
}

function toggle(i){
  if(carrito.includes(i)){
    carrito = carrito.filter(x=>x!==i);
  } else {
    carrito.push(i);
  }
  render();
}

function filtrarServicios(){
  render();
}

function enviar(){
  let texto = carrito.map(i=>servicios[i].nombre).join(", ");
  let url = "https://wa.me/5219996690192?text="+encodeURIComponent("Hola, me interesa: "+texto);
  window.location.href = url;
}

// INIT
render();
renderPromos();

</script>

</body>
</html>
