<script>

const servicios = [/* 👈 TODO IGUAL */];

let carrito = [];
const NUMERO_WHATSAPP = "5219992175116";
let filtro = "";
let promoSeleccionada = null;

/* ========================= */
/* CATÁLOGO */
/* ========================= */

function irAgenda(){

  let serviciosTxt = carrito.map(s=>s.nombre).join(", ");
  let params = new URLSearchParams(window.location.search);
  let desdeWA = params.get("from");

  if(desdeWA && desdeWA.toLowerCase() === "wa"){

    let numero = NUMERO_WHATSAPP;

    let mensaje = "Hola, me gustaría recibir información sobre los siguientes tratamientos: " 
                + serviciosTxt + 
                ". ¿Podrían contactarme por favor?";

    let data = JSON.parse(localStorage.getItem("carritoData")) || {};
    data.enviado = true;
    localStorage.setItem("carritoData", JSON.stringify(data));

    carrito = [];
    actualizarTotal();
    render();

    let url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje);
    window.location.href = url;

  } else {

    let numero = NUMERO_WHATSAPP;

    let mensaje = "Hola, me gustaría recibir información sobre los siguientes tratamientos: " 
                + serviciosTxt + 
                ". ¿Podrían contactarme por favor?";

    window.location.href = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje);
  }
}

/* ========================= */
/* PROMOS */
/* ========================= */

function renderPromos(){

  const slider = document.getElementById("promoSlider");
  const dots = document.getElementById("promoDots");

  if(!slider || !dots) return;

  let html = "";

  promociones.forEach(p=>{
    let vencida = new Date(p.vigencia) < new Date();

    html += `
      <div style="min-width:100%; padding:5px; box-sizing:border-box;">
        <img src="${p.imagen}" style="width:100%; border-radius:14px;">
        ${vencida ? '<div style="color:red; font-size:12px;">VENCIDA</div>' : ''}
        <div style="margin-top:8px; font-size:13px;">
          ${p.descripcion}
        </div>

        <button 
          onclick="interesPromo('${p.nombre}')"
          class="alt"
          style="margin-top:8px;">
          La quiero
        </button>
      </div>
    `;
  });

  slider.innerHTML = html;
  renderDots();
}

/* ========================= */
/* ENVÍO PROMOS */
/* ========================= */

function enviarSoloPromo(){

  let numero = NUMERO_WHATSAPP;

  let mensaje = "Hola, me interesa la siguiente promoción: " + promoSeleccionada;

  carrito = [];
  actualizarTotal();
  render();
  renderCategorias();

  window.location.href = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje);
}

function enviarTodo(){

  let numero = NUMERO_WHATSAPP;

  let serviciosTxt = carrito.map(s=>s.nombre).join(", ");

  let mensaje = "Hola, me interesa la promoción: " + promoSeleccionada;

  if(serviciosTxt.length > 0){
    mensaje += ". También me interesan: " + serviciosTxt;
  }

  carrito = [];
  actualizarTotal();
  render();
  renderCategorias();

  window.location.href = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje);
}

</script>

</body>
