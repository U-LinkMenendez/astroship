<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">

<title>Opciones disponibles</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #fafafa;
  margin: 0;
  padding: 20px;
  color: #222;
}

h1 {
  font-family: 'Playfair Display', serif;
  text-align: center;
  font-size: 22px;
  margin-bottom: 25px;
}

/* CARDS */
.card {
  background: white;
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  box-shadow: 0 4px 14px rgba(0,0,0,0.05);
  transition: all 0.2s ease;
}

.card:hover {
  transform: translateY(-2px);
}

.card.selected {
  border: 2px solid #c8a96a;
  background: #fffdf8;
}

.card img {
  width: 70px;
  height: 70px;
  border-radius: 10px;
  object-fit: cover;
}

.info {
  flex: 1;
}

.nombre {
  font-weight: 500;
  font-size: 14px;
}

.precio {
  font-size: 13px;
  color: #888;
  margin-top: 3px;
}

/* BOTÓN */
button {
  background: #111;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
}

button.alt {
  background: #c8a96a;
  color: black;
}

/* CARRITO */
.carrito {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: white;
  border-top: 1px solid #eee;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.total {
  font-size: 14px;
}

.lista {
  font-size: 11px;
  color: #777;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 14px;
  width: 90%;
  max-width: 380px;
}

.modal h3 {
  margin-top: 0;
}

.header {
  position: relative;
  margin-bottom: 15px;
}

.cover {
  width: 100vw;
  height: 22vw; /* proporción 1:4 aprox */
  object-fit: cover;
  margin-left: -20px;
  border-radius: 0;
}

.overlay {
  position: absolute;
  bottom: 10px;
  left: 15px;
  color: white;
}

.logo {
  width: 40px;
  border-radius: 50%;
}

.titulo {
  font-size: 14px;
  font-weight: 500;
}

/* BARRA CATEGORÍAS */
.categorias-bar {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px 0;
  position: sticky;
  top: 0;
  background: #fafafa;
  z-index: 10;
  margin-top: 10px;
}

.categoria-btn {
  padding: 6px 12px;
  background: #eee;
  border-radius: 20px;
  font-size: 12px;
  white-space: nowrap;
  cursor: pointer;
}

.categoria-btn.active {
  background: #c8a96a;
  color: black;
}

</style>
</head>

<body>

<div class="header">
  <img src="/img/Portada.jpg" class="cover">
  <div class="overlay">
    <img src="/img/Logo.png" class="logo">
    <div class="titulo">Reducenter KB</div>
  </div>
</div>

<div class="categorias-bar" id="categoriasBar"></div>

<div id="menu"></div>

<div class="carrito">
  <div>
    <div id="total" class="total">Total: $0</div>
    <div id="lista" class="lista"></div>
  </div>
  <button class="alt" onclick="abrirAgenda()">Agendar</button>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Confirmar selección</h3>
    <p id="resumen"></p>
    <button class="alt" onclick="irAgenda()">Continuar</button>
  </div>
</div>

<script>

const servicios = [

  // REJUVENECIMIENTO
  {
    nombre:"Botox (50 unidades)",
    precio:4500,
    img:"/img/botox.webp",
    desc:"Relaja los músculos faciales para disminuir líneas de expresión."
  },
  {
    nombre:"Medio Botox (25 unidades)",
    precio:2500,
    img:"/img/medio-botox.webp",
    desc:"Aplicación localizada para tratar zonas específicas."
  },
  {
    nombre:"MesoBotox",
    precio:5500,
    img:"/img/mesobotox.webp",
    desc:"Mejora textura y luminosidad combinando botox con activos."
  },
  {
    nombre:"Sculptra",
    precio:12000,
    img:"/img/sculptra.webp",
    desc:"Estimula colágeno para rejuvenecimiento progresivo."
  },
  {
    nombre:"Radiesse",
    precio:8000,
    img:"/img/radiesse.webp",
    desc:"Relleno que mejora volumen y firmeza."
  },

  // ARMONIZACIÓN
  {
    nombre:"Relleno de labios",
    precio:4000,
    img:"/img/lips.webp",
    desc:"Aporta volumen, definición y armonía a los labios."
  },
  {
    nombre:"Rinomodelación",
    precio:4000,
    img:"/img/nose.webp",
    desc:"Mejora la forma de la nariz sin cirugía."
  },
  {
    nombre:"Ácido hialurónico",
    precio:3500,
    img:"/img/acido.webp",
    desc:"Hidratación profunda y mejora de volumen facial."
  },

  // PIEL
  {
    nombre:"NCTF",
    precio:3500,
    img:"/img/patient.webp",
    desc:"Revitalización con vitaminas y ácido hialurónico."
  },
  {
    nombre:"CQ Styler",
    precio:4000,
    img:"/img/cq.webp",
    desc:"Mejora calidad y firmeza de la piel."
  },
  {
    nombre:"Liposucción enzimática",
    precio:2500,
    img:"/img/lipo.webp",
    desc:"Reduce grasa localizada sin cirugía."
  },

  // LÁSER
  {
    nombre:"CO2 ojos",
    precio:4000,
    img:"/img/eye.webp",
    desc:"Mejora arrugas finas y textura alrededor de los ojos."
  },
  {
    nombre:"CO2 mejillas",
    precio:5000,
    img:"/img/cheek.webp",
    desc:"Renovación de piel en zona media del rostro."
  },
  {
    nombre:"CO2 rostro",
    precio:10000,
    img:"/img/face.webp",
    desc:"Rejuvenecimiento completo con láser."
  },
  {
    nombre:"CO2 rostro y cuello",
    precio:15000,
    img:"/img/co2-cuello.webp",
    desc:"Tratamiento profundo en rostro y cuello."
  },
  {
    nombre:"CO2 rostro, cuello y escote",
    precio:20000,
    img:"/img/co2-escote.webp",
    desc:"Rejuvenecimiento integral de piel."
  },

  // HILOS
  {
    nombre:"Hilos cara",
    precio:12000,
    img:"/img/eyebrown.webp",
    desc:"Lifting sin cirugía para mejorar firmeza facial."
  },
  {
    nombre:"Hilos cuello",
    precio:12000,
    img:"/img/hilos-cuello.webp",
    desc:"Mejora flacidez en cuello."
  },
  {
    nombre:"Hilos cejas",
    precio:6000,
    img:"/img/hilos-cejas.webp",
    desc:"Eleva y define la zona de las cejas."
  },
  {
    nombre:"Hilos nariz",
    precio:4000,
    img:"/img/hilos-nariz.webp",
    desc:"Mejora la proyección nasal sin cirugía."
  },

  // EXTRA
  {
    nombre:"Eliminación de lunares",
    precio:0,
    img:"/img/lunares.webp",
    desc:"Requiere valoración previa para determinar tratamiento."
  }

];

let carrito = [];

const nombresCategorias = [
  "💉 Rejuvenecimiento",
  "💋 Armonización",
  "💆‍♀️ Piel",
  "🔥 Láser",
  "🧵 Hilos"
  "✨ Otros"
];

function renderCategorias(){
  let html = "";

  nombresCategorias.forEach((c, i)=>{
    html += `<div class="categoria-btn" onclick="scrollToCat(${i})">${c}</div>`;
  });

  document.getElementById("categoriasBar").innerHTML = html;
}

function scrollToCat(i){
  document.getElementById("cat"+i).scrollIntoView({behavior:"smooth"});
}
  
function render(){

  const categorias = {
  "💉 Rejuvenecimiento": servicios.filter(s =>
    ["Botox (50 unidades)","Medio Botox (25 unidades)","MesoBotox","Sculptra","Radiesse"].includes(s.nombre)
  ),

  "💋 Armonización": servicios.filter(s =>
    ["Relleno de labios","Rinomodelación","Ácido hialurónico"].includes(s.nombre)
  ),

  "💆‍♀️ Piel": servicios.filter(s =>
    ["NCTF","CQ Styler","Liposucción enzimática"].includes(s.nombre)
  ),

  "🔥 Láser": servicios.filter(s =>
    s.nombre.includes("CO2")
  ),

  "🧵 Hilos": servicios.filter(s =>
    s.nombre.includes("Hilos")
  ),

  "✨ Otros": servicios.filter(s =>
    ["Eliminación de lunares"].includes(s.nombre)
  )
};

  let html = "";

  Object.keys(categorias).forEach((cat, index) => {

    html += `<h2 id="cat${index}" style="margin-top:25px;">${cat}</h2>`;

    categorias[cat].forEach(s => {

      let i = servicios.findIndex(x => x.nombre === s.nombre);
      let seleccionado = carrito.find(x => x.nombre === s.nombre);

      html += `
        <div class="card ${seleccionado ? 'selected' : ''}">
          <img src="${s.img}">
          <div class="info">
           <div class="nombre">${s.nombre}</div>
           <div class="precio">$${s.precio}</div>
           <div style="font-size:11px;color:#777;margin-top:4px;">
            ${s.desc}
           </div>
         </div>
          <button onclick="agregar(${i})">
            ${seleccionado ? 'Quitar' : 'Agregar'}
          </button>
        </div>
      `;
    });

  });

  document.getElementById("menu").innerHTML = html;
}

function agregar(i){

  let servicio = servicios[i];
  let index = carrito.findIndex(s => s.nombre === servicio.nombre);

  if(index > -1){
    carrito.splice(index, 1);
  } else {
    carrito.push(servicio);
  }

  actualizarTotal();
  render();
  renderCategorias();
}

function actualizarTotal(){
  let total = carrito.reduce((acc,s)=>acc+s.precio,0);
  document.getElementById("total").innerText = "Total: $" + total;

  let nombres = carrito.map(s=>s.nombre).join(", ");
  document.getElementById("lista").innerText = nombres;
}

function abrirAgenda(){
  if(carrito.length==0){
    alert("Selecciona al menos un servicio");
    return;
  }

  let resumen = carrito.map(s=>s.nombre).join(", ");
  document.getElementById("resumen").innerText = resumen;
  document.getElementById("modal").style.display = "flex";
}

function irAgenda(){

  let serviciosTxt = carrito.map(s=>s.nombre).join(", ");
  let params = new URLSearchParams(window.location.search);
  let desdeWA = params.get("from");

  if(desdeWA && desdeWA.toLowerCase() === "wa"){

    let numero = "5219996690192";

    let mensaje = "Hola, ya revisé el catálogo y me interesan: "
                  + serviciosTxt + ". ¿Qué disponibilidad tienen?";

    let url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje);

    window.location.href = url;

  } else {

    let url = "https://cal.com/ulink/60min?servicios=" + encodeURIComponent(serviciosTxt);
    window.open(url, "_blank");

  }
}

render();
renderCategorias();

</script>

</body>
</html>
