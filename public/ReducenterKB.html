<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Opciones disponibles</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* (SIN CAMBIOS EN CSS) */
</style>
</head>

<body>

<!-- (SIN CAMBIOS EN HTML ESTRUCTURAL) -->

<script>

const servicios = [/* (SIN CAMBIOS) */];

let carrito = [];
const NUMERO_WHATSAPP = "5219992175116";
let filtro = "";
let promoSeleccionada = null;

/* ========================= */
/* FUNCIONES SIN CAMBIOS */
/* ========================= */

/* SOLO CORRECCIONES ABAJO 👇 */

/* ===== PROMOCIONES ===== */

const promociones = [
  {
    nombre: "Botox + Hidratación",
    imagen: "/img/Portada.jpg",
    descripcion: "Rejuvenece tu piel con esta promoción especial",
    vigencia: "2026-05-01"
  },
  {
    nombre: "CO2 Especial",
    imagen: "/img/Portada.jpg",
    descripcion: "Renovación profunda de la piel",
    vigencia: "2024-01-01"
  }
];

function renderPromos(){

  const slider = document.getElementById("promoSlider");
  const dots = document.getElementById("promoDots");

  if(!slider || !dots) return;

  let html = "";

  promociones.forEach(p=>{
    let vencida = new Date(p.vigencia) < new Date();

    html += `
      <div style="min-width:100%; padding:5px; box-sizing:border-box;">
        
        <img src="${p.imagen}" style="width:100%; border-radius:14px;">
        
        ${vencida ? '<div style="color:red; font-size:12px;">VENCIDA</div>' : ''}

        <div style="margin-top:8px; font-size:13px;">
          ${p.descripcion}
        </div>

        <button 
          onclick="interesPromo('${p.nombre}')"
          class="alt"
          style="margin-top:8px;">
          La quiero
        </button>

      </div>
    `;
  });

  slider.innerHTML = html;
}

/* ========================= */
/* MODAL PROMOS */
/* ========================= */

function interesPromo(nombre){

  promoSeleccionada = nombre;

  document.querySelector(".modal-content").innerHTML = `
    <h3>Confirmar envío</h3>
    <p>Seleccionaste: <b>${nombre}</b><br><br>¿Cómo deseas enviarlo?</p>

    <div style="display:flex; flex-direction:column; gap:10px; margin-top:15px;">

      <button class="alt" onclick="enviarSoloPromo()">
        Solo esta promoción
      </button>

      <button onclick="enviarTodo()">
        Incluir tratamientos seleccionados
      </button>

      <button onclick="cerrarModal()" style="background:#eee; color:#333;">
        Cancelar
      </button>

    </div>
  `;

  document.getElementById("modal").style.display = "flex";
}

/* ========================= */
/* ENVÍO WHATSAPP */
/* ========================= */

function enviarSoloPromo(){

  let mensaje = "Hola, me interesa la siguiente promoción: " + promoSeleccionada;

  carrito = [];
  render();

  window.location.href = "https://wa.me/" + NUMERO_WHATSAPP + "?text=" + encodeURIComponent(mensaje);
}

function enviarTodo(){

  let serviciosTxt = carrito.map(s=>s.nombre).join(", ");

  let mensaje = "Hola, me interesa la promoción: " + promoSeleccionada;

  if(serviciosTxt.length > 0){
    mensaje += ". También me interesan: " + serviciosTxt;
  }

  carrito = [];
  render();

  window.location.href = "https://wa.me/" + NUMERO_WHATSAPP + "?text=" + encodeURIComponent(mensaje);
}

</script>

</body>
</html>
