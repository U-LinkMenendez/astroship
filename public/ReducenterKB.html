<script>

const servicios = [/* SIN CAMBIOS */];

let carrito = [];
const NUMERO_WHATSAPP = "5219992175116"; // 👈 TU NÚMERO DE PRUEBA
let filtro = "";
let promoSeleccionada = null;

/* ========================= */
/* IR A WHATSAPP (CATÁLOGO) */
/* ========================= */

function irAgenda(){

  let serviciosTxt = carrito.map(s=>s.nombre).join(", ");
  let params = new URLSearchParams(window.location.search);
  let desdeWA = params.get("from");

  let mensaje = "Hola, vengo del catálogo web y me interesan: " + serviciosTxt;

  if(desdeWA && desdeWA.toLowerCase() === "wa"){

    let data = JSON.parse(localStorage.getItem("carritoData")) || {};
    data.enviado = true;
    localStorage.setItem("carritoData", JSON.stringify(data));

    carrito = [];
    actualizarTotal();
    render();

    let url = "https://wa.me/" + NUMERO_WHATSAPP + "?text=" + encodeURIComponent(mensaje);
    window.location.href = url;

  } else {

    window.location.href = "https://wa.me/" + NUMERO_WHATSAPP + "?text=" + encodeURIComponent(mensaje);
  }
}

/* ========================= */
/* PROMOCIONES */
/* ========================= */

function renderPromos(){

  const slider = document.getElementById("promoSlider");
  const dots = document.getElementById("promoDots");

  if(!slider || !dots) return;

  let html = "";

  promociones.forEach(p=>{
    let vencida = new Date(p.vigencia) < new Date();

    html += `
      <div style="min-width:100%; padding:5px; box-sizing:border-box;">
        
        <img src="${p.imagen}" style="width:100%; border-radius:14px;">
        
        ${vencida ? '<div style="color:red; font-size:12px;">VENCIDA</div>' : ''}

        <div style="margin-top:8px; font-size:13px;">
          ${p.descripcion}
        </div>

        <button 
          onclick="interesPromo('${p.nombre}')"
          class="alt"
          style="margin-top:8px;">
          La quiero
        </button>

      </div>
    `;
  });

  slider.innerHTML = html;
  renderDots();
}

/* ========================= */
/* ENVÍO PROMOS */
/* ========================= */

function enviarSoloPromo(){

  let mensaje = "Hola, vengo del catálogo web y me interesa la siguiente promoción: " 
              + promoSeleccionada;

  carrito = [];
  actualizarTotal();
  render();
  renderCategorias();

  window.location.href = "https://wa.me/" + NUMERO_WHATSAPP + "?text=" + encodeURIComponent(mensaje);
}

function enviarTodo(){

  let serviciosTxt = carrito.map(s=>s.nombre).join(", ");

  let mensaje = "Hola, vengo del catálogo web y me interesa la promoción: " 
              + promoSeleccionada;

  if(serviciosTxt.length > 0){
    mensaje += ". También me interesan: " + serviciosTxt;
  }

  carrito = [];
  actualizarTotal();
  render();
  renderCategorias();

  window.location.href = "https://wa.me/" + NUMERO_WHATSAPP + "?text=" + encodeURIComponent(mensaje);
}

</script>
