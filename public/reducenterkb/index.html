body {

}

h1 {
  font-family: 'Playfair Display', serif;
  text-align: center;
  font-size: 22px;
  margin-bottom: 25px;
}

/* CARDS */
.card {
  background: white;
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  box-shadow: 0 4px 14px rgba(0,0,0,0.05);
  transition: all 0.2s ease;
}

  .card {
  transition: all 0.2s ease;
}

  .card.added {
  transform: scale(0.97);
  background: #f5efe3;
}

.card:hover {
  transform: translateY(-2px);
}

.card.selected {
  border: 2px solid #c8a96a;
  background: #fffdf8;
}

.card img {
  width: 70px;
  height: 70px;
  border-radius: 10px;
  object-fit: cover;
}

.info {
  flex: 1;
}

.nombre {
  font-weight: 500;
  font-size: 14px;
}

.precio {
  font-size: 13px;
  color: #888;
  margin-top: 3px;
}

/* BOTÓN */
button {
  background: #111;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  transition: transform 0.1s ease;
}

button.alt {
  background: #c8a96a;
  color: black;
}

/* CARRITO */
.carrito {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: white;
  border-top: 1px solid #eee;
  padding: 12px 20px; /* 👈 cambio clave */
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-sizing: border-box; /* 👈 MUY importante */
}

.total {
  display: none;
}

.lista {
  font-size: 11px;
  color: #777;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 14px;
  width: 90%;
  max-width: 380px;
}

.modal h3 {
  margin-top: 0;
}

.header {
  position: relative;
  margin-bottom: 15px;
}

.cover {
  width: 100vw;
  height: 22vw; /* proporción 1:4 aprox */
  object-fit: cover;
  margin-left: -20px;
  border-radius: 0;
}

.overlay {
  position: absolute;
  bottom: 10px;
  left: 15px;
  color: white;
}

.logo {
  width: 40px;
  border-radius: 50%;
}

.titulo {
  font-size: 14px;
  font-weight: 500;
}

/* BARRA CATEGORÍAS */
.categorias-bar {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px 0;
  position: sticky;
  top: 0;
  background: #fafafa;
  z-index: 10;
  margin-top: 10px;
}

.categoria-btn {
  padding: 6px 12px;
  background: #eee;
  border-radius: 20px;
  font-size: 12px;
  white-space: nowrap;
  cursor: pointer;
}

.categoria-btn.active {
  background: #c8a96a;
  color: black;
}

  button:active {
  transform: scale(0.95);
}

#clearBtn:hover {
  color: #000;
}
  
</style>

window.addEventListener("scroll", () => {

  let categorias = document.querySelectorAll("h2");
  let scrollTop = window.scrollY;
  let windowHeight = window.innerHeight;
  let fullHeight = document.body.scrollHeight;

  // 🔥 DETECTAR FINAL REAL
  let alFinal = scrollTop + windowHeight >= fullHeight - 5;

  if(alFinal){
    activarCategoria(categorias.length - 1);
    return;
  }

  let scrollPos = scrollTop + 150;

  categorias.forEach((cat, i) => {

    let offsetTop = cat.offsetTop;
    let nextOffset = categorias[i+1]?.offsetTop;

    if(nextOffset){
      if(scrollPos >= offsetTop && scrollPos < nextOffset){
        activarCategoria(i);
      }
    }

  });

});


function activarCategoria(i){

  let botones = document.querySelectorAll(".categoria-btn");

  botones.forEach(btn => btn.classList.remove("active"));

  let btn = document.getElementById("btn"+i);

  if(btn && !btn.classList.contains("active")){
    btn.classList.add("active");

    btn.scrollIntoView({
      behavior: "smooth",
      inline: "center",
      block: "nearest"
    });
  }
}

          onclick='interesPromo(${JSON.stringify(p.nombre)})'
          class="alt"
          style="margin-top:8px;">
          La quiero
        </button>

      </div>
    `;
  });

  slider.innerHTML = html;

  renderDots();
}

function activarSwipe(){

  const slider = document.getElementById("promoSlider");

  if(!slider) return;

  slider.addEventListener("touchstart", (e)=>{
    startX = e.touches[0].clientX;
  });

  slider.addEventListener("touchend", (e)=>{
    endX = e.changedTouches[0].clientX;

    if(startX - endX > 50){
      moverPromo(1);
    }

    if(endX - startX > 50){
      moverPromo(-1);
    }
  });

 }

function moverPromo(dir){

  clearInterval(promoInterval);

  promoIndex += dir;

  if(promoIndex < 0) promoIndex = promociones.length - 1;
  if(promoIndex >= promociones.length) promoIndex = 0;

  const slider = document.getElementById("promoSlider");

  slider.style.transform = "translateX(-" + (promoIndex * 100) + "%)";

  renderDots();

  iniciarAutoSlide();
}
  
function iniciarAutoSlide(){

  clearInterval(promoInterval);

  promoInterval = setInterval(()=>{
    moverPromo(1);
  }, 4000);
}

function renderDots(){

  let dots = "";

  promociones.forEach((_, i)=>{
    dots += `<span style="
      display:inline-block;
      width:6px;
      height:6px;
      margin:3px;
      border-radius:50%;
      background:${i===promoIndex ? '#555' : '#ccc'};
    "></span>`;
  });

  document.getElementById("promoDots").innerHTML = dots;
}

function interesPromo(nombre){

  promoSeleccionada = nombre;

  document.getElementById("resumen").innerHTML = `
    Seleccionaste: <b>${nombre}</b><br><br>
    ¿Cómo deseas enviarlo?
  `;

  const botones = `
    <div style="display:flex; flex-direction:column; gap:10px; margin-top:15px;">

      <button class="alt" onclick="enviarSoloPromo()">
        Solo esta promoción
      </button>

      <button onclick="enviarTodo()">
        Incluir tratamientos seleccionados
      </button>

      <button onclick="cerrarModal()" style="background:#eee; color:#333;">
        Cancelar
      </button>

    </div>
  `;

  document.querySelector(".modal-content").innerHTML = `
    <h3>Confirmar envío</h3>
    <p id="resumen"></p>
    ${botones}
  `;

  document.getElementById("modal").style.display = "flex";
}

function enviarSoloPromo(){


  let mensaje = "Hola, vengo del catálogo web y me interesa la promoción: " + promoSeleccionada;

  // 🔥 LIMPIAR TODO
  carrito = [];
  actualizarTotal();
  render();
  renderCategorias();

  window.location.href = "https://wa.me/" + NUMERO_WHATSAPP + "?text=" + encodeURIComponent(mensaje);
}

function enviarTodo(){


  let serviciosTxt = carrito.map(s=>s.nombre).join(", ");

  let mensaje = "Hola, vengo del catálogo web y me interesa la promoción: " + promoSeleccionada;

  if(serviciosTxt.length > 0){
    mensaje += ". También me interesan: " + serviciosTxt;
  }

  carrito = [];
  actualizarTotal();
  render();
  renderCategorias();

  window.location.href = "https://wa.me/" + NUMERO_WHATSAPP + "?text=" + encodeURIComponent(mensaje);
}
  
</script>
