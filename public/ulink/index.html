<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">

<title>Opciones disponibles</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #fafafa;
  margin: 0;
  padding: 20px;
  padding-top: 64px;
  padding-bottom: 90px;
  color: #222;
}

/* BANNER FIJO */
.banner-activos {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 44px;
  background: #111;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  box-sizing: border-box;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.banner-activos:active { background: #1a1a1a; }

.banner-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #4ade80;
  flex-shrink: 0;
  animation: pulse-dot 2s infinite;
}

@keyframes pulse-dot {
  0%   { box-shadow: 0 0 0 0 rgba(74,222,128,0.6); }
  70%  { box-shadow: 0 0 0 6px rgba(74,222,128,0); }
  100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
}

.banner-texto {
  flex: 1;
  margin-left: 10px;
  font-size: 12px;
  color: #ccc;
  font-weight: 400;
}

.banner-texto strong {
  color: white;
  font-weight: 600;
}

.banner-cta {
  font-size: 11px;
  color: #c8a96a;
  font-weight: 600;
  letter-spacing: 0.4px;
  white-space: nowrap;
  margin-left: 10px;
}

h1 {
  font-family: 'Playfair Display', serif;
  text-align: center;
  font-size: 22px;
  margin-bottom: 25px;
}

/* CARDS */
.card {
  background: white;
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  box-shadow: 0 4px 14px rgba(0,0,0,0.05);
  transition: all 0.2s ease;
}

.card.added {
  transform: scale(0.97);
  background: #f5efe3;
}

.card:hover {
  transform: translateY(-2px);
}

.card.selected {
  border: 2px solid #c8a96a;
  background: #fffdf8;
}

.card img {
  width: 70px;
  height: 70px;
  border-radius: 10px;
  object-fit: cover;
}

.info {
  flex: 1;
}

.nombre {
  font-weight: 500;
  font-size: 14px;
}

.precio {
  font-size: 13px;
  color: #888;
  margin-top: 3px;
}

/* BOTÓN */
button {
  background: #111;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  transition: transform 0.1s ease;
}

button:active {
  transform: scale(0.95);
}

button.alt {
  background: #c8a96a;
  color: black;
}

/* CARRITO */
.carrito {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: white;
  border-top: 1px solid #eee;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-sizing: border-box;
}

.total {
  font-size: 14px;
}

.lista {
  font-size: 11px;
  color: #777;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 14px;
  width: 90%;
  max-width: 380px;
}

.modal h3 {
  margin-top: 0;
}

.header {
  position: relative;
  margin-bottom: 15px;
}

.cover {
  width: 100vw;
  height: 22vw;
  object-fit: cover;
  margin-left: -20px;
  border-radius: 0;
}

.overlay {
  position: absolute;
  bottom: 10px;
  left: 15px;
  color: white;
}

.logo {
  width: 40px;
  border-radius: 50%;
}

.titulo {
  font-size: 14px;
  font-weight: 500;
}

/* BARRA CATEGORÍAS */
.categorias-bar {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px 0;
  position: sticky;
  top: 44px; /* altura del banner */
  background: #fafafa;
  z-index: 10;
  margin-top: 10px;
}

.categoria-btn {
  padding: 6px 12px;
  background: #eee;
  border-radius: 20px;
  font-size: 12px;
  white-space: nowrap;
  cursor: pointer;
}

.categoria-btn.active {
  background: #c8a96a;
  color: black;
}

#clearBtn:hover {
  color: #000;
}
</style>
</head>

<body>

<!-- PANTALLA PROMOS -->
<div id="pantallaPromos" style="
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #fafafa;
  z-index: 999;
  overflow-y: auto;
  padding: 24px 20px 30px;
  box-sizing: border-box;
">

  <!-- Encabezado con botón de cierre comercial -->
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <div>
      <div style="font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:#999; margin-bottom:3px;">U Link</div>
      <h2 style="margin:0; font-size:18px; font-weight:600;">Casos reales</h2>
    </div>

    <!-- X comercial: círculo con SVG -->
    <button onclick="cerrarPromos()" style="
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #f0f0f0;
      border: none;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    ">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="1" y1="1" x2="13" y2="13" stroke="#333" stroke-width="2" stroke-linecap="round"/>
        <line x1="13" y1="1" x2="1" y2="13" stroke="#333" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Slider: wrapper externo hace el clip, el inner se transforma -->
  <div style="overflow: hidden; width: 100%; border-radius: 14px;">
    <div id="promoSlider" style="
      display: flex;
      transition: transform 0.4s ease;
      will-change: transform;
    "></div>
  </div>

  <!-- Controles de navegación -->
  <div style="display:flex; justify-content:center; gap:12px; margin-top:8px;">
    <button onclick="moverPromo(-1)" style="
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #111;
      color: white;
      border: none;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
    ">←</button>

    <button onclick="moverPromo(1)" style="
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #111;
      color: white;
      border: none;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
    ">→</button>
  </div>

  <div id="dots" style="
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 6px;
  "></div>

</div>

<!-- BANNER FIJO SUPERIOR -->
<div class="banner-activos" onclick="abrirPromos()">
  <div class="banner-dot"></div>
  <div class="banner-texto">
    <strong>3 negocios</strong> con chatbot activo ahora mismo
  </div>
  <div class="banner-cta">Ver casos →</div>
</div>

<div class="header">
  <img src="/ulink/img/portada.jpg" class="cover">
  <div class="overlay">
    <img src="/ulink/img/logo.png" class="logo">
    <div class="titulo">U Link Demo</div>
  </div>
</div>

<div style="margin-bottom:10px; position:relative;">
  <input 
    type="text" 
    id="buscador" 
    placeholder="🔍 Buscar tratamiento..."
    style="
      width: 100%;
      padding: 10px 35px 10px 14px;
      border-radius: 25px;
      border: 1px solid #ddd;
      font-size: 13px;
      outline: none;
      box-sizing: border-box;
    "
    oninput="filtrarServicios()"
  >

  <span 
    id="clearBtn"
    onclick="limpiarBusqueda()"
    style="
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: #999;
      cursor: pointer;
      display: none;
    "
  >✕</span>
</div>

<div class="categorias-bar" id="categoriasBar"></div>

<div id="menu"></div>

<div class="carrito">
  <div>
    <div id="total" class="total">Total: $0</div>
    <div id="lista" class="lista"></div>
  </div>
  <button class="alt" onclick="abrirAgenda()" id="btnAgendar">Agendar</button>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>¿Deseas agendar estos servicios?</h3>
    <p id="resumen"></p>

    <div style="display:flex; gap:10px; margin-top:15px;">
      <button onclick="cerrarModal()" style="flex:1; background:#eee; color:#333;">
        Regresar
      </button>
      <button class="alt" onclick="irAgenda()" style="flex:1;">
        Continuar
      </button>
    </div>
  </div>
</div>

<script>

const servicios = [

  // FACIAL AVANZADO
  { nombre:"Tratamiento facial premium",    precio:3200, categoria:"rejuvenecimiento", img:"/ulink/img/facial1.webp",         desc:"Mejora la apariencia general de la piel y suaviza líneas de expresión." },
  { nombre:"Aplicación localizada facial",  precio:2100, categoria:"rejuvenecimiento", img:"/ulink/img/facial2.webp",         desc:"Tratamiento dirigido a zonas específicas del rostro." },
  { nombre:"Rejuvenecimiento intensivo",    precio:4600, categoria:"rejuvenecimiento", img:"/ulink/img/facial3.webp",         desc:"Mejora textura, luminosidad y firmeza de la piel." },
  { nombre:"Estimulación de colágeno",      precio:7400, categoria:"rejuvenecimiento", img:"/ulink/img/facial4.webp",         desc:"Activa procesos naturales para rejuvenecimiento progresivo." },

  // ARMONIZACIÓN
  { nombre:"Perfilado estético facial",     precio:3800, categoria:"armonizacion",     img:"/ulink/img/armonizacion1.webp",   desc:"Mejora proporciones y equilibrio facial." },
  { nombre:"Definición de contorno",        precio:4200, categoria:"armonizacion",     img:"/ulink/img/armonizacion2.webp",   desc:"Resalta rasgos y estructura del rostro." },
  { nombre:"Hidratación profunda",          precio:2900, categoria:"armonizacion",     img:"/ulink/img/armonizacion3.webp",   desc:"Aporta volumen y mejora calidad de la piel." },

  // PIEL
  { nombre:"Revitalización cutánea",        precio:2600, categoria:"piel",             img:"/ulink/img/piel1.webp",           desc:"Nutre la piel con activos especializados." },
  { nombre:"Mejora de textura facial",      precio:3100, categoria:"piel",             img:"/ulink/img/piel2.webp",           desc:"Incrementa firmeza y uniformidad." },
  { nombre:"Reducción localizada",          precio:2300, categoria:"piel",             img:"/ulink/img/piel3.webp",           desc:"Apoya en la disminución de acumulaciones específicas." },

  // LÁSER
  { nombre:"Tratamiento láser zona pequeña",precio:3400, categoria:"laser",            img:"/ulink/img/laser1.webp",          desc:"Mejora textura y apariencia en áreas localizadas." },
  { nombre:"Tratamiento láser zona media",  precio:5100, categoria:"laser",            img:"/ulink/img/laser2.webp",          desc:"Renovación de piel en zonas específicas." },
  { nombre:"Tratamiento láser completo",    precio:9800, categoria:"laser",            img:"/ulink/img/laser3.webp",          desc:"Rejuvenecimiento integral del rostro." },

  // HILOS / FIRMEZA
  { nombre:"Tensado facial",                precio:8700, categoria:"hilos",            img:"/ulink/img/firmeza1.webp",        desc:"Mejora firmeza y soporte de la piel." },
  { nombre:"Reafirmación de cuello",        precio:9200, categoria:"hilos",            img:"/ulink/img/firmeza2.webp",        desc:"Reduce flacidez en zona cervical." },
  { nombre:"Elevación de contorno",         precio:5600, categoria:"hilos",            img:"/ulink/img/firmeza3.webp",        desc:"Mejora definición y posición de áreas faciales." },

  // OTROS
  { nombre:"Valoración personalizada",      precio:1200, categoria:"otros",            img:"/ulink/img/valoracion.webp",      desc:"Evaluación inicial para recomendar el mejor tratamiento." }

];

const promociones = [
  {
    nombre: "Nutrióloga Iratxe M.",
    icono: "🥗",
    imagen: "/ulink/img/caso-nutriologa.webp",
    bullets: [
      "Explica la metodología y agenda citas en automático",
      "Permite reagendar y comparte ubicación por Google Maps",
      "Notifica a la nutrióloga al instante ante cada reserva o consulta nueva"
    ]
  },
  {
    nombre: "Taller Artístico Blanco Terés",
    icono: "🎨",
    imagen: "/ulink/img/caso-taller.webp",
    bullets: [
      "Responde dudas a cualquier hora, incluso fines de semana",
      "Guía al prospecto hasta presentar costos; si el precio es un freno, ofrece una clase muestra sin costo",
      "Conecta Facebook, Instagram y WhatsApp en una sola bandeja"
    ]
  },
  {
    nombre: "Clínica Estética",
    icono: "✨",
    imagen: "/ulink/img/caso-chatbot.webp",
    bullets: [
      "Atención automatizada desde la primera consulta hasta agendar cita",
      "Flujo optimizado para una experiencia directa, clara y eficiente",
      "Diseñado a medida según los lineamientos del cliente"
    ]
  }
];

const nombresCategorias = [
  "💉 Rejuvenecimiento",
  "💋 Armonización",
  "💆‍♀️ Piel",
  "🔥 Láser",
  "🧵 Hilos",
  "✨ Otros"
];

let carrito = [];
let filtro = "";
let promoIndex = 0;
let startX = 0;
let endX = 0;
let swipeActivo = false;

// ─── RENDER PRINCIPAL ────────────────────────────────────────────────────────

function render() {
  const categorias = {
    "💉 Rejuvenecimiento": servicios.filter(s => s.categoria === "rejuvenecimiento"),
    "💋 Armonización":     servicios.filter(s => s.categoria === "armonizacion"),
    "💆‍♀️ Piel":             servicios.filter(s => s.categoria === "piel"),
    "🔥 Láser":            servicios.filter(s => s.categoria === "laser"),
    "🧵 Hilos":            servicios.filter(s => s.categoria === "hilos"),
    "✨ Otros":            servicios.filter(s => s.categoria === "otros")
  };

  let html = "";

  Object.keys(categorias).forEach((cat, index) => {
    let serviciosFiltrados = categorias[cat].filter(s =>
      !filtro ||
      s.nombre.toLowerCase().includes(filtro) ||
      s.desc.toLowerCase().includes(filtro)
    );

    if (serviciosFiltrados.length === 0) return;

    html += `<h2 id="cat${index}" style="margin-top:25px;">${cat}</h2>`;

    serviciosFiltrados.forEach(s => {
      let i = servicios.findIndex(x => x.nombre === s.nombre);
      let seleccionado = carrito.find(x => x.nombre === s.nombre);

      html += `
        <div class="card ${seleccionado ? 'selected added' : ''}">
          <img src="${s.img}">
          <div class="info">
            <div class="nombre">${s.nombre}</div>
            <div class="precio">$${s.precio}</div>
            <div style="font-size:11px;color:#777;margin-top:4px;">${s.desc}</div>
          </div>
          <button onclick="agregar(${i})">
            ${seleccionado ? 'Quitar' : 'Agregar'}
          </button>
        </div>
      `;
    });
  });

  document.getElementById("menu").innerHTML = html;
}

function renderCategorias() {
  let html = "";

  nombresCategorias.forEach((c, i) => {
    html += `<div class="categoria-btn" id="btn${i}" onclick="scrollToCat(${i})">${c}</div>`;
  });

  document.getElementById("categoriasBar").innerHTML = html;
}

// ─── CARRITO ─────────────────────────────────────────────────────────────────

function agregar(i) {
  let servicio = servicios[i];
  let index = carrito.findIndex(s => s.nombre === servicio.nombre);

  if (index > -1) {
    carrito.splice(index, 1);
  } else {
    carrito.push(servicio);
  }

  actualizarTotal();
  render();
  renderCategorias();

  setTimeout(() => {
    document.querySelectorAll(".card").forEach(c => c.classList.remove("added"));
  }, 150);
}

function actualizarTotal() {
  let total = carrito.reduce((acc, s) => acc + s.precio, 0);
  document.getElementById("total").innerText = "Total: $" + total;
  document.getElementById("lista").innerText = carrito.map(s => s.nombre).join(", ");

  let btn = document.getElementById("btnAgendar");
  if (btn) {
    btn.innerText = carrito.length > 0 ? "Agendar (" + carrito.length + ")" : "Agendar";
  }

  let data = JSON.parse(localStorage.getItem("carritoData")) || {};
  data.timestamp = Date.now();
  data.items = carrito;
  data.enviado = false;
  localStorage.setItem("carritoData", JSON.stringify(data));
}

// ─── MODAL AGENDA ─────────────────────────────────────────────────────────────

function abrirAgenda() {
  if (carrito.length === 0) {
    alert("Selecciona al menos un servicio");
    return;
  }
  document.getElementById("resumen").innerText = carrito.map(s => s.nombre).join(", ");
  document.getElementById("modal").style.display = "flex";
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

function irAgenda() {
  let serviciosTxt = carrito.map(s => s.nombre).join(", ");
  let numero = "5219996187124";
  let mensaje = "Hola, me interesan estos servicios: " + serviciosTxt + ". ¿Me puedes dar más información?";

  let data = JSON.parse(localStorage.getItem("carritoData")) || {};
  data.enviado = true;
  localStorage.setItem("carritoData", JSON.stringify(data));

  carrito = [];
  actualizarTotal();
  render();

  window.location.href = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje);
}

// ─── BÚSQUEDA ─────────────────────────────────────────────────────────────────

function filtrarServicios() {
  filtro = document.getElementById("buscador").value.toLowerCase();
  document.getElementById("clearBtn").style.display = filtro.length > 0 ? "block" : "none";
  render();
}

function limpiarBusqueda() {
  document.getElementById("buscador").value = "";
  filtro = "";
  document.getElementById("clearBtn").style.display = "none";
  render();
}

// ─── CATEGORÍAS / SCROLL ──────────────────────────────────────────────────────

function scrollToCat(i) {
  let elemento = document.getElementById("cat" + i);
  if (!elemento) return;
  let y = elemento.getBoundingClientRect().top + window.pageYOffset - 120;
  window.scrollTo({ top: y, behavior: "smooth" });
}

function activarCategoria(i) {
  document.querySelectorAll(".categoria-btn").forEach(btn => btn.classList.remove("active"));
  let btn = document.getElementById("btn" + i);
  if (btn) {
    btn.classList.add("active");
    btn.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
  }
}

window.addEventListener("scroll", () => {
  let categorias = document.querySelectorAll("#menu h2");
  let scrollTop = window.scrollY;
  let windowHeight = window.innerHeight;
  let fullHeight = document.body.scrollHeight;

  if (scrollTop + windowHeight >= fullHeight - 5) {
    activarCategoria(categorias.length - 1);
    return;
  }

  let scrollPos = scrollTop + 150;

  categorias.forEach((cat, i) => {
    let offsetTop = cat.offsetTop;
    let nextOffset = categorias[i + 1]?.offsetTop;

    if (nextOffset) {
      if (scrollPos >= offsetTop && scrollPos < nextOffset) {
        activarCategoria(i);
      }
    }
  });
});

// ─── PROMOS ───────────────────────────────────────────────────────────────────

function abrirPromos() {
  promoIndex = 0;
  document.getElementById("pantallaPromos").style.display = "block";
  document.getElementById("promoSlider").style.transform = "translateX(0%)";
  renderPromos();
  renderDots();
  activarSwipe();
}

function cerrarPromos() {
  document.getElementById("pantallaPromos").style.display = "none";
}

function renderPromos() {
  let html = "";

  promociones.forEach(p => {
    let bulletsHtml = p.bullets.map(b => `
      <div style="
        display: flex;
        align-items: flex-start;
        gap: 8px;
        margin-bottom: 8px;
        text-align: left;
      ">
        <span style="color:#4ade80; font-size:13px; flex-shrink:0; margin-top:1px;">✔</span>
        <span style="font-size:13px; color:#444; line-height:1.5;">${b}</span>
      </div>
    `).join("");

    html += `
      <div style="
        min-width: 100%;
        width: 100%;
        flex-shrink: 0;
        box-sizing: border-box;
        padding: 4px 2px;
      ">
        <img src="${p.imagen}" style="
          width: 100%;
          display: block;
          border-radius: 12px;
          object-fit: cover;
          aspect-ratio: 4 / 5;
        ">

        <div style="
          display: flex;
          align-items: center;
          gap: 8px;
          margin-top: 16px;
          margin-bottom: 10px;
        ">
          <span style="font-size:20px;">${p.icono}</span>
          <div style="font-weight:700; font-size:15px; color:#111;">${p.nombre}</div>
        </div>

        <div style="margin-bottom:16px;">${bulletsHtml}</div>

        <button class="alt" onclick="interesCaso('${p.nombre}')" style="
          width: 100%;
          padding: 12px;
          font-size: 13px;
          font-weight: 600;
          border-radius: 25px;
        ">
          Quiero implementar esto en mi negocio
        </button>
      </div>
    `;
  });

  document.getElementById("promoSlider").innerHTML = html;
}

function moverPromo(dir) {
  promoIndex += dir;
  if (promoIndex < 0) promoIndex = promociones.length - 1;
  if (promoIndex >= promociones.length) promoIndex = 0;

  document.getElementById("promoSlider").style.transform =
    "translateX(-" + (promoIndex * 100) + "%)";

  renderDots();
}

function renderDots() {
  document.getElementById("dots").innerHTML = promociones.map((_, i) => `
    <div style="
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: ${i === promoIndex ? '#000' : '#ccc'};
    "></div>
  `).join("");
}

function activarSwipe() {
  if (swipeActivo) return;

  const slider = document.getElementById("promoSlider");
  if (!slider) return;

  slider.addEventListener("touchstart", (e) => { startX = e.touches[0].clientX; });
  slider.addEventListener("touchend",   (e) => {
    endX = e.changedTouches[0].clientX;
    if (startX - endX > 50) moverPromo(1);
    if (endX - startX > 50) moverPromo(-1);
  });

  swipeActivo = true;
}

  if (!data) return;

  let minutos = (Date.now() - data.timestamp) / 60000;

  if (data.enviado || minutos >= 30) {
    localStorage.removeItem("carritoData");
  } else {
    carrito = data.items || [];
  }
})();
